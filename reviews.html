<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guest Reviews — Peace+Pines Paradise</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --pine: #2D3B2D; --bark: #5C4A3A; --cream: #F5F0E8;
  --sage: #8B9E7E; --sage-light: #B8C9AD;
  --gold: #C9A84C; --gold-light: #E8D59A;
  --charcoal: #2A2A2A; --smoke: #6B6B6B;
  --snow: #FAFAF7; --frost: #E8E4DC;
  --font-display: 'Playfair Display', Georgia, serif;
  --font-body: 'DM Sans', system-ui, sans-serif;
}
body { font-family: var(--font-body); background: var(--snow); color: var(--charcoal); min-height: 100vh; display: flex; flex-direction: column; }

header {
  background: var(--pine); padding: 1.25rem 2rem;
  display: flex; align-items: center; gap: 1rem;
}
header a {
  color: rgba(245,240,232,0.65); text-decoration: none;
  font-size: 0.82rem; font-weight: 500; letter-spacing: 0.05em;
  display: flex; align-items: center; gap: 0.4rem; transition: color 0.2s;
}
header a:hover { color: var(--gold-light); }
header .sep { color: rgba(245,240,232,0.3); }
header .current { color: var(--cream); font-weight: 600; font-size: 0.82rem; letter-spacing: 0.05em; }

main { flex: 1; max-width: 800px; margin: 0 auto; padding: 3.5rem 2rem 5rem; width: 100%; }

.page-label { font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.15em; color: var(--sage); margin-bottom: 0.6rem; }
.page-title { font-family: var(--font-display); font-size: clamp(1.8rem, 4vw, 2.6rem); color: var(--pine); margin-bottom: 2rem; }

.entries { display: flex; flex-direction: column; gap: 1.25rem; }

.entry {
  background: white; border-radius: 14px; padding: 1.5rem;
  border: 1px solid var(--frost);
}
.entry-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
.entry-author { display: flex; align-items: center; gap: 0.75rem; }
.avatar {
  width: 40px; height: 40px; border-radius: 50%;
  background: linear-gradient(135deg, var(--sage), var(--pine));
  display: flex; align-items: center; justify-content: center;
  color: white; font-weight: 600; font-size: 0.9rem; flex-shrink: 0;
}
.entry-name { font-weight: 600; color: var(--pine); font-size: 0.95rem; }
.entry-date { font-size: 0.78rem; color: var(--smoke); }
.entry-stars { color: var(--gold); font-size: 0.9rem; letter-spacing: 1px; }
.entry-text { color: var(--charcoal); line-height: 1.7; font-size: 0.92rem; }
.entry-origin { margin-top: 0.75rem; font-size: 0.78rem; color: var(--sage); font-weight: 500; }

.loading { text-align: center; color: var(--smoke); padding: 3rem 0; }
.empty { text-align: center; color: var(--smoke); padding: 3rem 0; }

footer { background: var(--charcoal); color: rgba(245,240,232,0.4); padding: 1.5rem; text-align: center; font-size: 0.8rem; }
footer a { color: var(--gold); text-decoration: none; }
footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<header>
  <a href="index.html">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    Peace+Pines Paradise
  </a>
  <span class="sep">›</span>
  <span class="current">All Reviews</span>
</header>

<main>
  <div class="page-label">Guest Experiences</div>
  <h1 class="page-title">All Reviews</h1>
  <div class="entries" id="entries">
    <div class="loading">Loading reviews…</div>
  </div>
</main>

<footer>
  <a href="index.html">← Back to Peace+Pines Paradise</a>
</footer>

<script>
async function loadReviews() {
  const container = document.getElementById('entries');
  try {
    const res = await fetch('/api/guestbook?all=true');
    const entries = await res.json();
    if (!entries.length) {
      container.innerHTML = '<div class="empty">No reviews yet.</div>';
      return;
    }
    container.innerHTML = entries.map(e => {
      const initials = e.name.split(' ').map(w => w[0]).slice(0, 2).join('');
      const stars = '★'.repeat(e.rating) + '☆'.repeat(5 - e.rating);
      return `
        <div class="entry">
          <div class="entry-header">
            <div class="entry-author">
              <div class="avatar">${initials}</div>
              <div><div class="entry-name">${e.name}</div><div class="entry-date">${e.visit_date || ''}</div></div>
            </div>
            <div class="entry-stars">${stars}</div>
          </div>
          <div class="entry-text">${e.message}</div>
          ${e.from_location ? `<div class="entry-origin">📍 ${e.from_location}</div>` : ''}
        </div>`;
    }).join('');
  } catch {
    container.innerHTML = '<div class="empty">Could not load reviews.</div>';
  }
}
loadReviews();
</script>
</body>
</html>
