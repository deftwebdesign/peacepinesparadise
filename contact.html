<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Peace+Pines Paradise</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --pine: #2D3B2D;
  --bark: #5C4A3A;
  --cream: #F5F0E8;
  --sage: #8B9E7E;
  --sage-light: #B8C9AD;
  --gold: #C9A84C;
  --gold-light: #E8D59A;
  --charcoal: #2A2A2A;
  --smoke: #6B6B6B;
  --snow: #FAFAF7;
  --frost: #E8E4DC;
  --font-display: 'Playfair Display', Georgia, serif;
  --font-body: 'DM Sans', system-ui, sans-serif;
}

body {
  font-family: var(--font-body);
  background: var(--snow);
  color: var(--charcoal);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

header {
  background: var(--pine);
  padding: 1.25rem 2rem;
  display: flex; align-items: center; gap: 1rem;
}
header a {
  color: rgba(245,240,232,0.65); text-decoration: none;
  font-size: 0.82rem; font-weight: 500; letter-spacing: 0.05em;
  display: flex; align-items: center; gap: 0.4rem;
  transition: color 0.2s;
}
header a:hover { color: var(--gold-light); }
header .sep { color: rgba(245,240,232,0.3); }
header .current { color: var(--cream); font-weight: 600; font-size: 0.82rem; letter-spacing: 0.05em; }

main {
  flex: 1;
  display: flex; align-items: center; justify-content: center;
  padding: 4rem 2rem;
}

.form-wrap {
  background: white; border-radius: 16px;
  border: 1.5px solid var(--frost);
  padding: 2.5rem;
  width: 100%; max-width: 520px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.05);
}

.page-label {
  font-size: 0.72rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.15em; color: var(--sage); margin-bottom: 0.5rem;
}
.page-title {
  font-family: var(--font-display); font-size: 1.9rem;
  color: var(--pine); margin-bottom: 0.5rem;
}
.page-desc {
  font-size: 0.9rem; color: var(--smoke); margin-bottom: 2rem; line-height: 1.6;
}

.form-group { margin-bottom: 1.1rem; }
.form-group label {
  display: block; font-size: 0.75rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--bark); margin-bottom: 0.35rem;
}
.form-group input, .form-group textarea {
  width: 100%; padding: 0.75rem 0.9rem;
  border: 1.5px solid var(--frost); border-radius: 8px;
  font-family: var(--font-body); font-size: 0.9rem;
  background: var(--snow); color: var(--charcoal);
  transition: border-color 0.3s; outline: none;
}
.form-group input:focus, .form-group textarea:focus {
  border-color: var(--sage);
}
.form-group textarea { resize: vertical; min-height: 120px; }

.submit-btn {
  width: 100%; padding: 0.9rem;
  background: var(--pine); color: var(--cream);
  border: none; border-radius: 8px;
  font-family: var(--font-body); font-size: 0.95rem; font-weight: 600;
  cursor: pointer; transition: all 0.3s; margin-top: 0.5rem;
}
.submit-btn:hover { background: var(--bark); box-shadow: 0 4px 16px rgba(45,59,45,0.2); }
.submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

.msg {
  display: none; margin-top: 1rem; padding: 0.85rem 1rem;
  border-radius: 8px; font-size: 0.88rem; font-weight: 500;
}
.msg.success { background: rgba(139,158,126,0.15); color: var(--pine); border: 1px solid var(--sage-light); }
.msg.error { background: rgba(199,91,57,0.08); color: #b94a2c; border: 1px solid rgba(199,91,57,0.3); }

footer {
  background: var(--pine); color: rgba(245,240,232,0.4);
  padding: 1.5rem; text-align: center; font-size: 0.8rem;
}
footer a { color: var(--gold); text-decoration: none; }
footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<header>
  <a href="index.html">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    Peace+Pines Paradise
  </a>
  <span class="sep">›</span>
  <span class="current">Contact</span>
</header>

<main>
  <div class="form-wrap">
    <div class="page-label">Get in Touch</div>
    <h1 class="page-title">Contact Us</h1>
    <p class="page-desc">Have a question or want to book directly? Send us a message and we'll get back to you shortly.</p>

    <form id="contactForm" onsubmit="submitForm(event)">
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="cName" placeholder="Jane Doe" required>
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="tel" id="cPhone" placeholder="(555) 555-5555">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="cEmail" placeholder="jane@example.com" required>
      </div>
      <div class="form-group">
        <label>Message</label>
        <textarea id="cComment" placeholder="What's on your mind?" required></textarea>
      </div>
      <button type="submit" class="submit-btn" id="submitBtn">Send Message</button>
      <div class="msg success" id="successMsg">Your message was sent! We'll be in touch soon.</div>
      <div class="msg error" id="errorMsg">Something went wrong. Please try again.</div>
    </form>
  </div>
</main>

<footer>
  <a href="index.html">← Back to Peace+Pines Paradise</a>
</footer>

<script>
async function submitForm(e) {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const successMsg = document.getElementById('successMsg');
  const errorMsg = document.getElementById('errorMsg');

  successMsg.style.display = 'none';
  errorMsg.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Sending…';

  try {
    const res = await fetch('/api/contact', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: document.getElementById('cName').value.trim(),
        phone: document.getElementById('cPhone').value.trim(),
        email: document.getElementById('cEmail').value.trim(),
        comment: document.getElementById('cComment').value.trim(),
      }),
    });

    if (res.ok) {
      successMsg.style.display = 'block';
      document.getElementById('contactForm').reset();
    } else {
      errorMsg.style.display = 'block';
    }
  } catch {
    errorMsg.style.display = 'block';
  }

  btn.disabled = false;
  btn.textContent = 'Send Message';
}
</script>

</body>
</html>
